appId: com.modelforge.app
productName: "ModelForge"
copyright: "Copyright © 2024 AMC Team"

directories:
  output: builds
  buildResources: build-resources

files:
  - "dist/**/*"
  - "electron/dist/**/*"
  - "package.json"

extraFiles: []

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.png
  artifactName: "ModelForge-Setup.exe"

mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: build-resources/icon.png
  category: public.app-category.developer-tools
  artifactName: "ModelForge.dmg"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build-resources/icon.png
  category: Development
  artifactName: "ModelForge.AppImage"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
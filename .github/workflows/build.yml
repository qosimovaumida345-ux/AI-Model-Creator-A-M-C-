name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate app icon
        shell: bash
        run: |
          mkdir -p build-resources
          node -e "
          const zlib = require('zlib');
          const fs = require('fs');
          const w = 512, h = 512;
          const raw = Buffer.alloc((w * 4 + 1) * h);
          for (let y = 0; y < h; y++) {
            raw[y * (w * 4 + 1)] = 0;
            for (let x = 0; x < w; x++) {
              const i = y * (w * 4 + 1) + 1 + x * 4;
              const cx = w/2, cy = h/2, r = w/2;
              const dist = Math.sqrt((x-cx)**2+(y-cy)**2);
              if (dist < r) {
                raw[i] = 0; raw[i+1] = 150; raw[i+2] = 255; raw[i+3] = 255;
              } else {
                raw[i] = 10; raw[i+1] = 10; raw[i+2] = 20; raw[i+3] = 255;
              }
            }
          }
          const deflated = zlib.deflateSync(raw);
          function crc32(buf) {
            const table = new Uint32Array(256);
            for (let n = 0; n < 256; n++) {
              let v = n;
              for (let k = 0; k < 8; k++) v = v & 1 ? 0xEDB88320 ^ (v >>> 1) : v >>> 1;
              table[n] = v;
            }
            let c = 0xFFFFFFFF;
            for (let i = 0; i < buf.length; i++) c = table[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
            return (c ^ 0xFFFFFFFF) >>> 0;
          }
          function chunk(type, data) {
            const len = Buffer.alloc(4); len.writeUInt32BE(data.length);
            const t = Buffer.from(type);
            const crc = Buffer.alloc(4); crc.writeUInt32BE(crc32(Buffer.concat([t, data])));
            return Buffer.concat([len, t, data, crc]);
          }
          const sig = Buffer.from([137,80,78,71,13,10,26,10]);
          const ihdr = Buffer.alloc(13);
          ihdr.writeUInt32BE(w,0); ihdr.writeUInt32BE(h,4);
          ihdr[8]=8; ihdr[9]=6;
          const png = Buffer.concat([sig, chunk('IHDR',ihdr), chunk('IDAT',deflated), chunk('IEND',Buffer.alloc(0))]);
          fs.writeFileSync('build-resources/icon.png', png);
          console.log('Icon 512x512 created');
          "

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build
        env:
         VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Build electron files
        run: npm run build:electron

      - name: Build server
        shell: bash
        run: |
          cd server
          npm install --no-audit --no-fund
          npx tsc || true

      - name: Build Windows app
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: builds/ModelForge-Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: builds/ModelForge-Setup.exe


services:
  # ── Backend API ─────────────────────────────────────
  - type: web
    name: ai-model-creator-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        value: https://ai-model-creator-a-m-c.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: REPLICATE_USERNAME
        sync: false
      - key: OLLAMA_HOST
        value: "http://localhost:11434"
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: modelforge-data
      mountPath: /opt/render/project/server/data
      sizeGB: 1

  # ── Frontend Static Site ────────────────────────────
  - type: web
    name: ai-model-creator-a-m-c
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-model-creator-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
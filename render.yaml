# ═══════════════════════════════════════════════════════
# AI MODEL FORGE — Render.com Deployment Configuration
# ═══════════════════════════════════════════════════════
# Deploy: connect your GitHub repo to Render, it reads this file.

services:
  # ── Backend API ─────────────────────────────────────
  - type: web
    name: modelforge-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: REPLICATE_USERNAME
        sync: false
      - key: OLLAMA_HOST
        value: "http://localhost:11434"
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: modelforge-data
      mountPath: /opt/render/project/server/data
      sizeGB: 1

  # ── Frontend Static Site ────────────────────────────
  - type: web
    name: modelforge
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://modelforge-api.onrender.com/api
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true